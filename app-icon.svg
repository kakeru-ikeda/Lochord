<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <!-- Modern Indigo to Purple to Pink gradient -->
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="50%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Smooth rounded background -->
  <rect width="1024" height="1024" rx="224" fill="url(#gradient)" />
  
  <g fill="#FFFFFF" filter="url(#shadow)">
    <!-- Lochord 'L' shaped by descending equalizer/chord bars -->
    <!-- Left tall bar (Base of the L stem) -->
    <rect x="242" y="232" width="140" height="560" rx="70" />
    
    <!-- Middle bar -->
    <rect x="442" y="432" width="140" height="360" rx="70" />
    
    <!-- Right short bar (Tip of the L base) -->
    <rect x="642" y="592" width="140" height="200" rx="70" />
  </g>
</svg>
